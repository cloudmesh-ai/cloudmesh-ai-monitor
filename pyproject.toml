[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "cloudmesh-ai-monitor"
version = "0.1.0"
description = "Observability extension for cloudmesh-ai services"
dependencies = [
    "requests",
    "rich",
    "pyyaml",
    "cloudmesh-ai-common",
]

[project.scripts]
cloudmesh-ai-monitor = "cloudmesh.ai.command.monitor:main"

[project.entry-points."cloudmesh.ai.command"]
monitor = "cloudmesh.ai.monitor.command.cli:entry_point"
