<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudmesh AI Monitor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { transition: background-color 0.3s, color 0.3s; }
        .dark-theme { background-color: #0f172a; color: #f8fafc; }
        .light-theme { background-color: #f1f5f9; color: #1e293b; }
        .light-theme .bg-slate-800 { background-color: #ffffff; border-color: #cbd5e1; color: #1e293b; }
        .light-theme .bg-slate-900 { background-color: #f8fafc; border-color: #cbd5e1; color: #1e293b; }
        .light-theme .text-slate-400 { color: #64748b; }
        .light-theme .border-slate-700 { border-color: #cbd5e1; }
        .light-theme .hover\:bg-slate-700\/50:hover { background-color: #e2e8f0; }
        .light-theme .text-green-400 { color: #15803d; }
        .light-theme .text-yellow-400 { color: #db2777; }
    </style>
</head>
<body class="p-8">
    <div x-data="monitorApp()" x-init="init()" x-cloak>
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <h1 class="text-3xl font-bold text-blue-400 shrink"><i class="fa-solid fa-rocket mr-3"></i>Cloudmesh AI Monitor Dashboard</h1>
                <span class="text-sm text-slate-400 font-mono shrink-0">v0.1.0</span>
                <a href="https://github.com/cloudmesh-ai/cloudmesh-ai-monitor" target="_blank" class="text-slate-300 hover:text-blue-400 transition text-xl shrink-0">
                    <i class="fa-brands fa-github"></i>
                </a>
            </div>
            <div class="flex gap-3">
                <button @click="fetchHosts()" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg transition flex items-center gap-2">
                    <i class="fa-solid fa-rotate"></i> <span>Refresh All</span>
                </button>
                <button @click="openAddModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> <span>Add Host</span>
                </button>
                <button @click="openSetupModal()" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg transition flex items-center gap-2">
                    <i class="fa-solid fa-gear"></i> <span>Setup</span>
                </button>
            </div>
        </div>

        <!-- Dashboard Table -->
        <div class="overflow-x-auto bg-slate-800 rounded-xl shadow-2xl border border-slate-700">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-900 text-slate-400 uppercase text-xs font-semibold">
                        <th class="py-2 px-4 border-b border-slate-700">Label</th>
                        <th class="py-2 px-4 border-b border-slate-700">Hostname</th>
                        <th class="py-2 px-4 border-b border-slate-700">Active</th>
                        <th class="py-2 px-4 border-b border-slate-700">Interval</th>
                        <th class="py-2 px-4 border-b border-slate-700">Last Updated</th>
                        <th class="py-2 px-4 border-b border-slate-700">GPU Usage</th>
                        <th class="py-2 px-4 border-b border-slate-700">GPU Temp</th>
                        <th class="py-2 px-4 border-b border-slate-700">Memory</th>
                        <th class="py-2 px-4 border-b border-slate-700">CPU Usage</th>
                        <th class="py-2 px-4 border-b border-slate-700">CPU Temp</th>
                        <th class="py-2 px-4 border-b border-slate-700 text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="host in hosts" :key="host.label">
                        <tr class="border-b border-slate-700 hover:bg-slate-700/50 transition">
                            <td class="py-2 px-4 font-medium" x-text="host.label"></td>
                            <td class="py-2 px-4 text-slate-400" x-text="host.hostname"></td>
                            <td class="py-2 px-4">
                                <input type="checkbox" :checked="host.active" @change="toggleHost(host.label)" class="w-4 h-4 rounded bg-slate-900 border-slate-600 text-blue-600">
                            </td>
                            <td class="py-2 px-4 text-slate-400" x-text="host.refresh_interval + 's'"></td>
                                   <td class="py-2 px-4 font-mono text-xs" :class="!host.is_stale ? 'text-slate-400' : (host.is_probing ? 'text-yellow-400 font-bold' : 'text-red-400 font-bold')" x-text="humanizeTime(host.last_updated)"></td>
                                 <td class="py-2 px-4 font-mono text-xs text-right" :class="host.gpu_usage.color" x-text="host.gpu_usage.text"></td>
                                 <td class="py-2 px-4 font-mono text-xs text-right" :class="host.gpu_temp.color" x-text="host.gpu_temp.text"></td>
                                 <td class="py-2 px-4 font-mono text-xs text-right" :class="host.mem_usage.color" x-text="host.mem_usage.text"></td>
                                  <td class="py-2 px-4 font-mono text-xs text-right" :class="host.cpu_usage.color" x-text="host.cpu_usage.text"></td>
                                  <td class="py-2 px-4 font-mono text-xs text-right" :class="host.cpu_temp.color" x-text="host.cpu_temp.text"></td>
                            <td class="py-2 px-4 text-center">
                                <div class="flex justify-center gap-2">
                                    <button @click="openEditModal(host)" class="p-1 hover:text-blue-400 transition"><i class="fa-solid fa-pen-to-square"></i></button>
                                    <button @click="probeHost(host.label)" class="p-1 hover:text-green-400 transition"><i class="fa-solid fa-play"></i></button>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <!-- Add/Edit Modal -->
        <div x-show="modalOpen" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50" x-cloak>
            <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 w-full max-w-md shadow-2xl">
                <h2 class="text-xl font-bold mb-4" x-text="editMode ? 'Edit Host' : 'Add New Host'"></h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Label</label>
                        <input type="text" x-model="form.label" :disabled="editMode" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Hostname</label>
                        <input type="text" x-model="form.hostname" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Probe Command</label>
                        <input type="text" x-model="form.probe_cmd" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Interval (s)</label>
                            <input type="number" x-model.number="form.refresh_interval" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div class="flex items-center mt-6">
                            <input type="checkbox" x-model="form.active" class="w-4 h-4 rounded bg-slate-900 border-slate-600 text-blue-600">
                            <label class="ml-2 text-sm text-slate-300">Active</label>
                        </div>
                    </div>
                </div>
                <div class="flex justify-between mt-6">
                    <button x-show="editMode" @click="deleteHost()" class="text-red-400 hover:text-red-300 text-sm font-medium">Remove Host</button>
                    <div class="flex gap-3 ml-auto">
                        <button @click="modalOpen = false" class="px-4 py-2 text-slate-400 hover:text-white transition">Cancel</button>
                        <button @click="saveHost()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition">Save</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Probe Result Modal -->
        <div x-show="probeModalOpen" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50" x-cloak>
            <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 w-full max-w-md shadow-2xl text-center">
                <h2 class="text-xl font-bold mb-4 flex items-center justify-center gap-2"><i class="fa-solid fa-circle-notch fa-spin mr-2 text-blue-400"></i> Probing Host</h2>
                <p class="text-slate-400 mb-6">The probe has been triggered. Metrics will update in the dashboard shortly.</p>
                <div class="flex justify-center">
                    <button @click="probeModalOpen = false" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition">OK</button>
                </div>
            </div>
        </div>

        <!-- Setup Modal -->
        <div x-show="setupModalOpen" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50" x-cloak>
            <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 w-full max-w-md shadow-2xl">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-gear"></i> Setup</h2>
                <div class="space-y-6">
                    <!-- Theme Toggle -->
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Theme</label>
                        <div class="flex gap-4">
                            <button @click="tempSettings.theme = 'light'; applySettings(tempSettings)" :class="tempSettings.theme === 'light' ? 'bg-blue-600 text-white' : 'bg-slate-900 text-slate-400'" class="flex-1 py-2 rounded-lg transition border border-slate-700">Light</button>
                            <button @click="tempSettings.theme = 'dark'; applySettings(tempSettings)" :class="tempSettings.theme === 'dark' ? 'bg-blue-600 text-white' : 'bg-slate-900 text-slate-400'" class="flex-1 py-2 rounded-lg transition border border-slate-700">Dark</button>
                        </div>
                    </div>
                    <!-- Font Size -->
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Font Size (6 - 32)</label>
                        <div class="flex items-center gap-4">
                            <input type="range" min="6" max="32" x-model.number="tempSettings.fontSize" @input="applySettings(tempSettings)" class="flex-1 h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                            <span class="w-8 text-center font-mono" x-text="tempSettings.fontSize"></span>
                        </div>
                    </div>
                </div>
                <div class="flex justify-end gap-3 mt-8">
                    <button @click="setupModalOpen = false; applySettings(settings)" class="px-4 py-2 text-slate-400 hover:text-white transition">Cancel</button>
                    <button @click="saveSettings()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function monitorApp() {
            return {
                hosts: [],
                modalOpen: false,
                editMode: false,
                probeModalOpen: false,
                setupModalOpen: false,
                settings: {
                    theme: 'dark',
                    fontSize: 16
                },
                tempSettings: {
                    theme: 'dark',
                    fontSize: 16
                },
                form: {
                    label: '',
                    hostname: '',
                    probe_cmd: '',
                    refresh_interval: 10,
                    active: true
                },
                async init() {
                    const saved = localStorage.getItem('monitor_settings');
                    if (saved) {
                        this.settings = JSON.parse(saved);
                    }
                    this.applySettings(this.settings);
                    await this.fetchHosts();
                    setInterval(() => this.fetchHosts(), 5000);
                },
                async fetchHosts() {
                    try {
                        const res = await fetch('/api/hosts');
                        this.hosts = await res.json();
                    } catch (e) {
                        console.error('Failed to fetch hosts', e);
                    }
                },
                openAddModal() {
                    this.editMode = false;
                    this.form = { label: '', hostname: '', probe_cmd: '', refresh_interval: 10, active: true };
                    this.modalOpen = true;
                },
                openEditModal(host) {
                    this.editMode = true;
                    this.form = { ...host };
                    this.modalOpen = true;
                },
                async saveHost() {
                    const method = this.editMode ? 'PUT' : 'POST';
                    const url = this.editMode ? `/api/hosts/${this.form.label}` : '/api/hosts';
                    
                    try {
                        await fetch(url, {
                            method: method,
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.form)
                        });
                        this.modalOpen = false;
                        await this.fetchHosts();
                    } catch (e) {
                        alert('Error saving host');
                    }
                },
                async deleteHost() {
                    if (!confirm('Are you sure you want to remove this host?')) return;
                    try {
                        await fetch(`/api/hosts/${this.form.label}`, { method: 'DELETE' });
                        this.modalOpen = false;
                        await this.fetchHosts();
                    } catch (e) {
                        alert('Error deleting host');
                    }
                },
                async toggleHost(label) {
                    try {
                        await fetch(`/api/hosts/${label}/toggle`, { method: 'POST' });
                        await this.fetchHosts();
                    } catch (e) {
                        console.error('Error toggling host');
                    }
                },
                async probeHost(label) {
                    try {
                        const res = await fetch(`/api/hosts/${label}/probe`, { method: 'POST' });
                        const data = await res.json();
                        if (data.status === 'probing') {
                            this.probeModalOpen = true;
                        }
                    } catch (e) {
                        alert('Error triggering probe');
                    }
                },
                humanizeTime(timestamp) {
                    if (!timestamp) return 'Never';
                    const date = new Date(timestamp);
                    const now = new Date();
                    const diffInSeconds = Math.floor((now - date) / 1000);

                    if (diffInSeconds < 5) return 'just now';
                    if (diffInSeconds < 60) return `${diffInSeconds}s ago`;
                    if (diffInSeconds < 3600) return `${Math.floor(diffInSeconds / 60)}m ago`;
                    if (diffInSeconds < 86400) return `${Math.floor(diffInSeconds / 3600)}h ago`;
                    return date.toLocaleDateString();
                },
                openSetupModal() {
                    this.tempSettings = { ...this.settings };
                    this.applySettings(this.tempSettings);
                    this.setupModalOpen = true;
                },
                saveSettings() {
                    this.settings = { ...this.tempSettings };
                    localStorage.setItem('monitor_settings', JSON.stringify(this.settings));
                    this.applySettings(this.settings);
                    this.setupModalOpen = false;
                },
                applySettings(s) {
                    document.body.className = 'p-8 ' + (s.theme === 'light' ? 'light-theme' : 'dark-theme');
                    document.documentElement.style.fontSize = s.fontSize + 'px';
                }
            }
        }
    </script>
</body>
</html>
